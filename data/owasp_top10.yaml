A01:2021-Broken Access Control: >
  Failures in enforcing user permissions, object ownership checks,
  route-level authorization, and horizontal/vertical privilege separation.

A02:2021-Cryptographic Failures: >
  Weak or missing encryption, insecure key management, insecure transport,
  plaintext sensitive data storage, and misuse of cryptographic primitives.

A03:2021-Injection: >
  Untrusted input interpreted as commands/queries, including SQL/NoSQL/OS/LDAP
  injection and template injection when input is unsafely concatenated.

A04:2021-Insecure Design: >
  Missing security controls by design, unsafe workflows, and threat model gaps.

A05:2021-Security Misconfiguration: >
  Insecure defaults, verbose errors, permissive CORS, unnecessary services, and weak headers.

A06:2021-Vulnerable and Outdated Components: >
  Using libraries or dependencies with known vulnerabilities or unsupported versions.

A07:2021-Identification and Authentication Failures: >
  Session/authentication weaknesses, credential issues, poor password/token handling.

A08:2021-Software and Data Integrity Failures: >
  Insecure CI/CD, unsigned updates, insecure deserialization and integrity checks.

A09:2021-Security Logging and Monitoring Failures: >
  Missing audit logs, weak alerting, poor traceability, and delayed incident detection.

A10:2021-Server-Side Request Forgery (SSRF): >
  Server fetches user-supplied URLs without strict validation and network restrictions.

